apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: factoryflow-ingress
  namespace: factoryflow
spec:
  rules:
  - host: factoryflow.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 8000